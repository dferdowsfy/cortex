<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complyze Shield</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c18;
            --card: #0d1225;
            --blue: #3b82f6;
            --blue-d: #1d4ed8;
            --glow: rgba(59, 130, 246, 0.22);
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: #f1f5f9;
            --muted: #64748b;
            --border: rgba(59, 130, 246, 0.18);
            --r: 12px;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            overflow: hidden;
        }

        .wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .hdr {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 11px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .logo-box {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--blue-d), var(--blue));
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 10px var(--glow);
        }

        .logo-box svg {
            width: 15px;
            height: 15px;
        }

        .logo-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo-tag {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
        }

        .dot.on {
            background: var(--green);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        /* ── Content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* ── Login ── */
        .hero {
            text-align: center;
            padding: 10px 0 18px;
        }

        .shield-big {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #1e3a8a, var(--blue));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.3);
        }

        .shield-big svg {
            width: 28px;
            height: 28px;
        }

        .inp {
            width: 100%;
            background: #111827;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
        }

        .btn-primary {
            width: 100%;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-google {
            width: 100%;
            background: #fff;
            color: #1f2937;
            border: none;
            border-radius: 8px;
            padding: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        /* ── Health Status Card (Issue 3) ── */
        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin: 16px 0 8px;
        }

        .health-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 14px;
            margin-bottom: 12px;
        }

        .health-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .health-row:last-child {
            margin-bottom: 0;
        }

        .health-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
        }

        .health-dot.green {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .health-dot.yellow {
            background: var(--amber);
            box-shadow: 0 0 6px var(--amber);
        }

        .health-label {
            font-size: 12px;
            font-weight: 500;
        }

        .health-val {
            margin-left: auto;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-tile {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
        }

        .stat-lbl {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── User Footer ── */
        .footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .u-info {
            flex: 1;
            overflow: hidden;
        }

        .u-name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .u-email {
            font-size: 10px;
            color: var(--muted);
        }

        .signout-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
        }

        /* Scan status bar (re-added for scan results) */
        .scan-status {
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            display: none;
        }

        .scan-status.active {
            display: block;
        }

        .scan-status.safe {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .scan-status.risk {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .scan-status.redact {
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <!-- Header -->
        <div class="hdr">
            <div class="logo-box">
                <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
            </div>
            <div>
                <div class="logo-name">Complyze</div>
                <div class="logo-tag">Shield</div>
            </div>
            <div class="hdr-right">
                <div class="dot" id="hdr-dot"></div>
                <button class="close-btn" id="close-sidebar-btn">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Login Panel -->
            <div id="login-panel" class="panel">
                <div class="hero">
                    <div class="shield-big">
                        <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                        </svg>
                    </div>
                    <h2>AI Security Sidebar</h2>
                    <p>Login to activate governance controls</p>
                </div>
                <div id="standard-login">
                    <input class="inp" type="email" id="email-inp" placeholder="Email" />
                    <input class="inp" type="password" id="pass-inp" placeholder="Password" />
                    <button class="btn-primary" id="login-btn">Sign In</button>

                    <div style="margin: 18px 0; display: flex; align-items: center; gap: 12px; opacity: 0.5;">
                        <div style="flex:1; height:1px; background:var(--border)"></div>
                        <div style="font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px">Or use
                            your key</div>
                        <div style="flex:1; height:1px; background:var(--border)"></div>
                    </div>

                    <input class="inp" type="text" id="license-inp" placeholder="CMP-XXXXX-XXXXX"
                        style="text-align:center; font-family:monospace; letter-spacing:1.5px; border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.03)" />
                    <button class="btn-primary" id="license-btn"
                        style="background:#059669; border:1px solid rgba(16,185,129,0.4); box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2)">Activate
                        Organization License</button>
                </div>

                <button class="btn-google" id="google-btn">
                    <svg width="16" height="16" viewBox="0 0 18 18">
                        <path
                            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                            fill="#4285F4" />
                        <path
                            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
                            fill="#34A853" />
                        <path
                            d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
                            fill="#FBBC05" />
                        <path
                            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
                <div id="login-err"
                    style="color:var(--red);font-size:11px;margin-top:12px;text-align:center;font-weight:600;"></div>
            </div>

            <!-- Main Panel -->
            <div id="main-panel" class="panel">
                <div class="section-title">Extension Health</div>
                <div class="health-card">
                    <div class="health-row">
                        <div class="health-dot green" id="dot-installed"></div>
                        <div class="health-label">Extension Status</div>
                        <div class="health-val text-green-400" id="val-version">v1.4.0</div>
                    </div>
                    <div class="health-row">
                        <div class="health-dot green" id="dot-connected"></div>
                        <div class="health-label">Connection</div>
                        <div class="health-val text-green-400" id="val-connected">Active</div>
                    </div>
                    <div class="health-row">
                        <div class="health-dot green" id="dot-shield"></div>
                        <div class="health-label">Shield Logic</div>
                        <div class="health-val text-green-400" id="val-shield">Applied</div>
                    </div>
                    <div class="health-row"
                        style="margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.05)">
                        <div class="health-label" style="opacity:0.5; font-size:10px;">Security Pulse</div>
                        <div class="health-val" id="val-last-seen" style="font-family:monospace;">—</div>
                    </div>
                </div>

                <div class="section-title">Live Activity Feed</div>
                <div id="activity-feed"
                    style="display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; padding-right: 4px;">
                    <!-- Activity items will be injected here -->
                    <div class="empty-state"
                        style="text-align: center; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px dashed var(--border);">
                        <div
                            style="font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">
                            Monitoring Active Sessions</div>
                    </div>
                </div>

                <div class="stats-footer"
                    style="margin-top: 16px; padding: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 12px;">
                        <div>
                            <div id="stat-scanned" style="font-size: 14px; font-weight: 800; color: #fff;">0</div>
                            <div
                                style="font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase;">
                                Scanned</div>
                        </div>
                        <div>
                            <div id="stat-blocked" style="font-size: 14px; font-weight: 800; color: var(--red);">0</div>
                            <div
                                style="font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase;">
                                Blocked</div>
                        </div>
                    </div>
                    <a href="https://complyze.co/dashboard" target="_blank"
                        style="font-size: 11px; font-weight: 700; color: var(--blue); text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em;">Open
                        Dashboard →</a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer" id="user-footer" style="display:none">
            <div class="avatar" id="u-avatar">?</div>
            <div class="u-info">
                <div class="u-name" id="u-name">User</div>
                <div class="u-email" id="u-email">email@company.com</div>
            </div>
            <button class="signout-btn" id="signout-btn">Logout</button>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>

</html>
